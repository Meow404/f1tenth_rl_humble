# ===================================================================
# Levine Hall (UPenn) — Quick Training Config
# ===================================================================
#
# This is a simple config for training on the Levine Hall SLAM map.
# No domain randomization, no fancy reward shaping — just the basics.
# Good for quickly testing whether a new idea works on your home track
# before committing to a long sim2real training run.
#
# For actual deployment on the real car, use sim2real_e2e.yaml instead.
# This config is for rapid iteration in simulation.
#
# Map: maps/levine_blocked/levine_blocked (hand-drawn) or
#      maps/levine_slam/levine_slam (SLAM-generated from real building)
#
# Usage:
#   python scripts/train.py --config configs/levine.yaml
#   python scripts/train.py --config configs/levine.yaml \
#       --map maps/levine_slam/levine_slam --total-steps 2000000
# ===================================================================

experiment:
  name: ""
  seed: 42
  device: "auto"
  runs_dir: "runs"
  wandb: true
  wandb_project: "f1tenth_rl"
  wandb_entity: null

env:
  map_path: "maps/levine_blocked/levine_blocked"
  map_ext: ".png"
  num_agents: 1
  timestep: 0.01
  integrator: "rk4"
  num_envs: 8
  max_steps: 3000
  num_laps: 1

lidar:
  raw_beams: 1080
  fov_deg: 270.0
  range_max: 30.0
  start_pose: null

observation:
  type: "lidar_state"
  lidar_beams: 108
  lidar_clip: 10.0
  lidar_normalize: true
  include_velocity: true
  include_yaw_rate: true
  include_steering: false
  include_prev_action: true
  num_waypoints: 5
  waypoint_spacing: 0.5
  frame_stack: 1

action:
  type: "continuous"
  max_speed: 3.0
  min_speed: 0.5
  max_steer: 0.4189
  num_speed_bins: 5
  num_steer_bins: 7
  residual_steer_range: 0.15
  residual_speed_range: 2.0
  smoothing_alpha: 1.0
  chunking_enabled: false
  chunk_horizon_steps: 1

reward:
  type: "progress"
  raceline_path: null
  progress_weight: 10.0
  speed_weight: 0.1
  collision_penalty: -10.0
  lap_bonus: 10.0
  heading_weight: 0.04
  crosstrack_weight: 0.004
  steering_change_penalty: 0.0
  survival_reward: 0.0

algorithm:
  type: "ppo"
  total_timesteps: 1_000_000
  ppo:
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 128
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    use_sde: false
  sac:
    learning_rate: 0.0003
    buffer_size: 1_000_000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    learning_starts: 10000
    train_freq: 1
    ent_coef: "auto"
  td3:
    learning_rate: 0.001
    buffer_size: 1_000_000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    learning_starts: 10000
    train_freq: 1
    policy_delay: 2
  custom_ppo:
    learning_rate: 0.0003
    num_steps: 2048
    num_minibatches: 32
    update_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_coef: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    anneal_lr: true
    normalize_advantages: true

network:
  type: "mlp"
  mlp:
    hidden_sizes: [256, 256]
    activation: "relu"
  cnn1d:
    channels: [32, 64]
    kernel_sizes: [5, 3]
    strides: [2, 2]
    fc_size: 128
  shared_layers: false
  pi_layers: [64, 64]
  vf_layers: [64, 64]

domain_randomization:
  enabled: false
  friction:
    enabled: true
    range: [0.6, 1.4]
  mass:
    enabled: true
    range: [3.0, 4.5]
  lidar_noise:
    enabled: true
    std: 0.02
  lidar_dropout:
    enabled: false
    rate: 0.02
  action_delay:
    enabled: false
    max_steps: 2
  cornering_stiffness:
    enabled: false
    scale_range: [0.8, 1.2]

imitation:
  bc:
    enabled: false
    demo_path: "demos/expert_demos.npz"
    epochs: 100
    learning_rate: 0.001
    batch_size: 256
    validation_split: 0.1
  init_from_bc: false
  bc_model_path: "runs/bc_pretrained/bc_model.pt"

expert:
  waypoint_path: null
  pure_pursuit:
    lookahead_distance: 1.0
    adaptive_lookahead: true
    lookahead_gain: 0.4
    min_lookahead: 0.5
    max_lookahead: 2.0
    target_speed: 3.0

evaluation:
  eval_freq: 50000
  n_eval_episodes: 10
  deterministic: true
  num_episodes: 50
  render: false
  save_trajectories: true

callbacks:
  checkpoint_freq: 50000
