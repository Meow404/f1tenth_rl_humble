# ===================================================================
# Sim2Real: Localized Policy (Lidar + Particle Filter)
# ===================================================================
#
# This policy uses a particle filter to know WHERE on the track the
# car is. This lets the agent see upcoming waypoints and follow a
# specific raceline — something the end-to-end policy can't do.
#
# Pros:
#   - Can follow an optimized raceline precisely
#   - Track-aware decisions (knows which corner is coming)
#   - Potentially faster lap times than E2E
#
# Cons:
#   - Requires a particle filter running on the car
#   - Extra computation and complexity
#   - If localization fails, the policy gets garbage inputs
#   - Can exhibit oscillating steering ("waypoint chasing")
#
# Observation vector (122 dimensions):
#   [108 lidar, velocity, yaw_rate, prev_steer, prev_speed,
#    5 × (distance_to_waypoint, heading_to_waypoint)]
#
# To reduce steering oscillation:
#   - Increase waypoint_spacing (1.5m+ works well)
#   - Increase steering_change_penalty (1.0+)
#
# Usage:
#   python scripts/train.py --config configs/sim2real_localized.yaml \
#       --map maps/levine_slam/levine_slam --num-envs 12 --device cuda
# ===================================================================

lidar:
  raw_beams: 1080
  fov_deg: 270.0
  range_max: 30.0
  
  # NEW: Lidar scan update frequency in Hz
  # 0 (default) = update every step (100 Hz, no decoupling)
  # 20 = new scan every 50ms (5 steps at 100 Hz physics)
  update_freq_hz: 20
  
  # NEW: Control loop frequency in Hz
  # 0 (default) = every step (100 Hz)
  # 50 = policy inference every 2 steps
  # Must be >= lidar update frequency
  control_freq_hz: 50

experiment:
  name: "sim2real_localized"
  seed: 42
  device: "auto"
  runs_dir: "runs"
  wandb: true
  wandb_project: "f1tenth_rl"

env:
  map_path: "maps/levine_race2/levine_race2"
  map_ext: ".pgm"
  num_agents: 1
  timestep: 0.01
  integrator: "rk4"
  num_envs: 8
  max_steps: 3000
  num_laps: 1

lidar:
  raw_beams: 1080
  fov_deg: 270.0
  range_max: 30.0

observation:
  type: "lidar_waypoint"       # Lidar + waypoint features (needs localization)
  lidar_beams: 108
  lidar_clip: 10.0
  lidar_normalize: true
  include_velocity: true
  include_yaw_rate: true
  include_steering: false
  include_prev_action: true
  num_waypoints: 5             # 5 upcoming waypoints
  waypoint_spacing: 1.5        # 1.5m apart — wider spacing reduces oscillation
  frame_stack: 1

action:
  type: "continuous"
  max_speed: 3.0
  min_speed: 0.5
  max_steer: 0.4189
  smoothing_alpha: 0.3
  steer_dead_zone: 0.0
  max_steer_rate: 0.0

reward:
  type: "cth"
  collision_penalty: -10.0
  lap_bonus: 10.0
  heading_weight: 0.2
  crosstrack_weight: 0.1
  steering_change_penalty: 1.0 # Higher penalty to fight oscillation
  wall_proximity_penalty: 0.5
  wall_proximity_threshold: 0.3
  speed_weight: 0.0
  survival_reward: 0.01

algorithm:
  type: "ppo"
  total_timesteps: 2_000_000
  ppo:
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.001
    vf_coef: 0.5
    max_grad_norm: 0.5

network:
  type: "mlp"
  mlp:
    hidden_sizes: [128, 128]
    activation: "relu"
  pi_layers: [64, 64]
  vf_layers: [64, 64]

domain_randomization:
  enabled: true
  mode: "curriculum"
  curriculum_warmup: 0.2
  curriculum_full: 0.6
  friction: { enabled: true, range: [0.7, 1.3] }
  mass: { enabled: true, range: [3.2, 4.2] }
  lidar_noise: { enabled: true, std: 0.04 }
  lidar_dropout: { enabled: true, rate: 0.02 }
  action_delay: { enabled: true, max_steps: 3 }

expert:
  pure_pursuit:
    target_speed: 3.0

evaluation:
  eval_freq: 25000
  n_eval_episodes: 20
  deterministic: true

callbacks:
  checkpoint_freq: 50000
