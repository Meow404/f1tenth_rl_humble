# ===================================================================
# Sim2Real: Localized Policy + ACT Chunking
# ===================================================================
#
# Based on sim2real_localized.yaml, but with:
#   - action chunking enabled for ACT-style training
#   - curriculum schedules for max speed and safety margin
#   - the same sim2real domain randomization stack as the localized preset
#
# Usage:
#   python scripts/train.py --config configs/sim2real_localized_act.yaml \
#       --map maps/levine_slam/levine_slam --num-envs 12 --device cuda
# ===================================================================

lidar:
  raw_beams: 1080
  fov_deg: 270.0
  range_max: 30.0

  # NEW: Lidar scan update frequency in Hz
  # 0 (default) = update every step (100 Hz, no decoupling)
  # 20 = new scan every 50ms (5 steps at 100 Hz physics)
  update_freq_hz: 20

  # NEW: Control loop frequency in Hz
  # 0 (default) = every step (100 Hz)
  # 50 = policy inference every 2 steps
  # Must be >= lidar update frequency
  control_freq_hz: 50

experiment:
  name: "sim2real_localized_act"
  seed: 42
  device: "auto"
  runs_dir: "runs"
  wandb: true
  wandb_project: "f1tenth_rl"

env:
  map_path: "maps/levine_race2/levine_race2"
  map_ext: ".pgm"
  num_agents: 1
  timestep: 0.01
  integrator: "rk4"
  num_envs: 8
  max_steps: 3000
  num_laps: 1

observation:
  type: "lidar_waypoint"       # Lidar + waypoint features (needs localization)
  lidar_beams: 108
  lidar_clip: 10.0
  lidar_normalize: true
  include_velocity: true
  include_yaw_rate: true
  include_steering: false
  include_prev_action: true
  num_waypoints: 5             # 5 upcoming waypoints
  waypoint_spacing: 1.5        # 1.5m apart — wider spacing reduces oscillation
  frame_stack: 1

action:
  type: "continuous"
  max_speed: 3.0
  min_speed: 0.5
  max_steer: 0.4189
  smoothing_alpha: 0.3
  steer_dead_zone: 0.0
  max_steer_rate: 0.0
  chunking_enabled: true
  chunk_horizon_steps: 3

reward:
  type: "cth"
  collision_penalty: -10.0
  lap_bonus: 10.0
  heading_weight: 0.2
  crosstrack_weight: 0.1
  steering_change_penalty: 1.0 # Higher penalty to fight oscillation
  wall_proximity_penalty: 0.5
  wall_proximity_threshold: 0.3
  speed_weight: 0.0
  survival_reward: 0.01

algorithm:
  type: "ppo"
  total_timesteps: 2_000_000
  ppo:
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.001
    vf_coef: 0.5
    max_grad_norm: 0.5

network:
  type: "mlp"
  mlp:
    hidden_sizes: [128, 128]
    activation: "relu"
  pi_layers: [64, 64]
  vf_layers: [64, 64]

# Domain randomization: keep the sim2real stack from sim2real_localized.
# The max speed / safety margin schedule is tracked separately in the
# curriculum section below, which matches the existing trainer examples.
domain_randomization:
  enabled: true
  mode: "curriculum"
  curriculum_warmup: 0.2
  curriculum_full: 0.6
  friction: { enabled: true, range: [0.7, 1.3] }
  mass: { enabled: true, range: [3.2, 4.2] }
  lidar_noise: { enabled: true, std: 0.04 }
  lidar_dropout: { enabled: true, rate: 0.02 }
  action_delay: { enabled: true, max_steps: 3 }

# Curriculum schedule for the runtime max_speed / safety_margin values.
# This is the repo's existing convention for those two parameters.
curriculum:
  enabled: true
  steps_per_phase: 100_000
  speed_schedule:  [2.0, 2.5, 3.0, 3.5, 4.0, 5.0, 6.0]
  margin_schedule: [1.5, 1.2, 1.0, 0.8, 0.6, 0.4, 0.3]

expert:
  pure_pursuit:
    target_speed: 3.0

evaluation:
  eval_freq: 25000
  n_eval_episodes: 20
  deterministic: true

callbacks:
  checkpoint_freq: 50000
